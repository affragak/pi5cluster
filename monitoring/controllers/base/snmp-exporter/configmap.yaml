          - name: cfwConnectionStatValue
            oid: 1.3.6.1.4.1.9.9.147.1.2.2.2.1.5
            type: gauge
            help: ASA active connections (cfwConnectionStatType=connectionInUse=40)
            indexes:
              - labelname: cfwConnectionStatService
                type: gauge
              - labelname: cfwConnectionStatType
                type: gauge
