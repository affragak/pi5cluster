grafana:
  alerting:
    cisco-asa-rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: cisco-asa
          folder: cisco-asa
          interval: 1m
          rules:
            # ── Rule 1: critical / error events (severity 0-3) ────────
            # Each unique %ASA-X-NNNNNN code per device is its own alert
            # instance. asa_code is extracted via the regexp parser.
            - uid: cisco-asa-critical
              title: ASA critical / error events
              condition: B
              for: 1m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-3]-"
                            | regexp `%ASA-[0-3]-(?P<asa_code>\d+):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: critical
                team: network
              annotations:
                summary: "%ASA-{{`{{ $labels.asa_code }}`}} on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} occurrence(s) of %ASA-X-{{`{{ $labels.asa_code }}`}} (severity 0-3 = emergency / alert / critical / error) on {{`{{ $labels.routerboard }}`}} in the last 5 minutes.
                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-[0-3]-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 2: ACL deny spike ────────────────────────────────
            # Covers %ASA-X-106xxx (interface ACL family) and 710003
            # (control-plane denies).
            - uid: cisco-asa-acl-deny-spike
              title: ASA ACL deny spike
              condition: B
              for: 5m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-7]-(106|710003)"
                            | regexp `%ASA-[0-7]-(?P<asa_code>106\d{3}|710003):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [100], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "ACL deny spike (%ASA-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} ACL/access denies (%ASA-X-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} in 5 minutes — possible scan or flood.
                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 3: threat detection (scanner) ────────────────────
            - uid: cisco-asa-threat-detection
              title: ASA threat detection event
              condition: B
              for: 1m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-4-7331(00|02)"
                            | regexp `%ASA-4-(?P<asa_code>7331(?:00|02)):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "Threat detection (%ASA-4-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  ASA built-in scanner detection fired: %ASA-4-{{`{{ $labels.asa_code }}`}} ({{`{{ $values.A.Value }}`}} events in 5m on {{`{{ $labels.routerboard }}`}}).
                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-4-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 4: repeated authentication failures ──────────────
            - uid: cisco-asa-auth-failures
              title: ASA repeated auth failures
              condition: B
              for: 5m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[46]-(113015|605004|113006)"
                            | regexp `%ASA-[46]-(?P<asa_code>113015|605004|113006):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [5], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "Auth failures (%ASA-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} failed-auth events (%ASA-X-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} in 5 minutes — possible brute-force or misconfigured client.
                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 5: ASA interface state change (link up/down) ────
            - uid: cisco-asa-link-state-change
              title: ASA interface state change
              condition: B
              for: 0m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-5]-411[0-9]{3}"
                            | regexp `%ASA-[0-5]-(?P<asa_code>411\d{3}):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "Interface state change (%ASA-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} link/line-protocol event(s) (%ASA-X-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} in 5 minutes — check `show interface` on the device.
                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"
