grafana:
  alerting:
    cisco-asa-rules.yaml:
      apiVersion: 1
      groups:
        - orgId: 1
          name: cisco-asa
          folder: cisco-asa
          interval: 1m
          rules:
            # ── Rule 1: critical / error events (severity 0-3) ────────
            # Per-event alerting: regexp extracts both the asa_code AND
            # the message body, group includes msg so each unique
            # critical line fires with full context (e.g. BGP neighbor
            # 192.1.20.2 Down ...).
            - uid: cisco-asa-critical
              title: ASA critical / error events
              condition: B
              for: 1m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code, msg) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-3]-"
                            | regexp `%ASA-[0-3]-(?P<asa_code>\d+):\s*(?P<msg>.*)`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: critical
                team: network
              annotations:
                summary: "%ASA-{{`{{ $labels.asa_code }}`}} on {{`{{ $labels.routerboard }}`}}: {{`{{ $labels.msg }}`}}"
                description: |-
                  {{`{{ $labels.routerboard }}`}}: %ASA-X-{{`{{ $labels.asa_code }}`}} fired {{`{{ $values.A.Value }}`}}× in 5m (severity 0-3 = emergency / alert / critical / error).

                  Message:
                  {{`{{ $labels.msg }}`}}

                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-[0-3]-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 2: ACL deny spike (volume detection) ─────────────
            # Stays aggregated by (routerboard, asa_code) — including msg
            # would split the count across every (src,dst) tuple and
            # break threshold semantics for spike detection.
            - uid: cisco-asa-acl-deny-spike
              title: ASA ACL deny spike
              condition: B
              for: 5m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-7]-(106|710003)"
                            | regexp `%ASA-[0-7]-(?P<asa_code>106\d{3}|710003):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [100], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "ACL deny spike (%ASA-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} ACL/access denies (%ASA-X-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} in 5 minutes — possible scan or flood.

                  Inspect (sample of denied traffic, src/dst tuples):
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 3: threat detection (scanner) ────────────────────
            - uid: cisco-asa-threat-detection
              title: ASA threat detection event
              condition: B
              for: 1m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code, msg) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-4-7331(00|02)"
                            | regexp `%ASA-4-(?P<asa_code>7331(?:00|02)):\s*(?P<msg>.*)`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "Threat detection (%ASA-4-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}}: {{`{{ $labels.msg }}`}}"
                description: |-
                  {{`{{ $labels.routerboard }}`}}: ASA built-in scanner detection fired %ASA-4-{{`{{ $labels.asa_code }}`}} ({{`{{ $values.A.Value }}`}}× in 5m).

                  Message:
                  {{`{{ $labels.msg }}`}}

                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-4-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 4: repeated authentication failures ──────────────
            # Stays aggregated — threshold > 5 means "5 failures in 5m"
            # for brute-force detection. Including msg would split per
            # (user, src) pair and never reach the threshold.
            - uid: cisco-asa-auth-failures
              title: ASA repeated auth failures
              condition: B
              for: 5m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[46]-(113015|605004|113006)"
                            | regexp `%ASA-[46]-(?P<asa_code>113015|605004|113006):`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [5], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "Auth failures (%ASA-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} (x{{`{{ $values.A.Value }}`}} in 5m)"
                description: |-
                  {{`{{ $values.A.Value }}`}} failed-auth events (%ASA-X-{{`{{ $labels.asa_code }}`}}) on {{`{{ $labels.routerboard }}`}} in 5 minutes — possible brute-force or misconfigured client.

                  Inspect (sample of attempts, source IPs, usernames):
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"

            # ── Rule 5: ASA interface state change (link up/down) ────
            - uid: cisco-asa-link-state-change
              title: ASA interface state change
              condition: B
              for: 0m
              noDataState: OK
              execErrState: Error
              isPaused: false
              data:
                - refId: A
                  relativeTimeRange: {from: 600, to: 0}
                  datasourceUid: P8E80F9AEF21F6940
                  model:
                    datasource: {type: loki, uid: P8E80F9AEF21F6940}
                    editorMode: code
                    expr: |-
                      sum by (routerboard, asa_code, msg) (
                        count_over_time(
                          {vendor="cisco"}
                            |~ "%ASA-[0-5]-411[0-9]{3}"
                            | regexp `%ASA-[0-5]-(?P<asa_code>411\d{3}):\s*(?P<msg>.*)`
                            [5m]
                        )
                      )
                    queryType: instant
                    refId: A
                - refId: B
                  relativeTimeRange: {from: 0, to: 0}
                  datasourceUid: __expr__
                  model:
                    datasource: {type: __expr__, uid: __expr__}
                    expression: A
                    refId: B
                    type: threshold
                    conditions:
                      - evaluator: {params: [0], type: gt}
                        operator: {type: and}
                        query: {params: [B]}
                        reducer: {type: last, params: []}
                        type: query
              labels:
                severity: warning
                team: network
              annotations:
                summary: "%ASA-{{`{{ $labels.asa_code }}`}} on {{`{{ $labels.routerboard }}`}}: {{`{{ $labels.msg }}`}}"
                description: |-
                  {{`{{ $labels.routerboard }}`}}: link/line-protocol event %ASA-X-{{`{{ $labels.asa_code }}`}} ({{`{{ $values.A.Value }}`}}× in 5m).

                  Message:
                  {{`{{ $labels.msg }}`}}

                  Inspect in Grafana → Explore → Loki:
                  {vendor="cisco", routerboard="{{`{{ $labels.routerboard }}`}}"} |~ "%ASA-X-{{`{{ $labels.asa_code }}`}}"
