apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: meilisearch
  namespace: meilisearch
spec:
  interval: 1h
  chart:
    spec:
      chart: meilisearch
      version: "0.28.0"
      sourceRef:
        kind: HelmRepository
        name: meilisearch
        namespace: meilisearch
      interval: 12h
  values:
    environment:
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: true

    auth:
      existingMasterKeySecret: meilisearch-master-key

    persistence:
      enabled: true
      size: 2Gi
      storageClass: local-path # your existing provisioner
      accessMode: ReadWriteOnce

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # internal only — no Ingress, no Cloudflare tunnel
    # Hugo CI and your blog JS reach it via ClusterIP
    service:
      type: ClusterIP
      port: 7700
