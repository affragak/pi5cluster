# apps/base/netbox/secrets.yaml
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-secret
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: netbox/secretkey
        property: secretKey
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-superuser-secret
    creationPolicy: Owner
  data:
    - secretKey: username # → env SUPERUSER_NAME
      remoteRef:
        key: netbox/superuser
        property: username
    - secretKey: email # → env SUPERUSER_EMAIL
      remoteRef:
        key: netbox/superuser
        property: email
    - secretKey: email_password # → /run/secrets/superuser_password (chart v8 hardcoded key name)
      remoteRef:
        key: netbox/superuser
        property: password
    - secretKey: api_token # → /run/secrets/superuser_api_token
      remoteRef:
        key: netbox/superuser
        property: api_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-postgresql-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-postgresql-secret
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: netbox/postgresql
        property: password
    - secretKey: postgres-password
      remoteRef:
        key: netbox/postgresql
        property: postgresPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-redis-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: netbox/redis
        property: password
