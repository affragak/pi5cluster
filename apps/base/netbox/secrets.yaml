---
# Django SECRET_KEY
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-secret
    creationPolicy: Owner
  data:
    - secretKey: secret_key # key the chart mounts at /run/secrets/netbox/secret_key
      remoteRef:
        key: netbox/secretkey
        property: secretKey
---
# Superuser — chart v8 expects these exact key names
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-superuser-secret
    creationPolicy: Owner
  data:
    - secretKey: username # → env SUPERUSER_NAME
      remoteRef:
        key: netbox/superuser
        property: username
    - secretKey: email # → env SUPERUSER_EMAIL
      remoteRef:
        key: netbox/superuser
        property: email
    - secretKey: password # → mounted at /run/secrets/superuser_password
      remoteRef:
        key: netbox/superuser
        property: password
    - secretKey: api_token # → mounted at /run/secrets/superuser_api_token
      remoteRef:
        key: netbox/superuser
        property: api_token
---
# PostgreSQL
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-postgresql-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-postgresql-secret
    creationPolicy: Owner
  data:
    - secretKey: password # netbox DB user password
      remoteRef:
        key: netbox/postgresql
        property: password
    - secretKey: postgres-password # postgres superuser password
      remoteRef:
        key: netbox/postgresql
        property: postgresPassword
---
# Redis / Valkey
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-redis-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: netbox/redis
        property: password
