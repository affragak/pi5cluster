# Keys derived from: helm template netbox netbox/netbox --version 8.0.23
#
# Chart projects these volumes:
#   netbox-secret          → secret_key, email_password
#   netbox-superuser-secret → password, api_token
#   netbox-postgresql-secret → password
#   netbox-valkey           → valkey-password (created by sub-chart)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-secret
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: netbox/secretkey
        property: secretKey
    - secretKey: email_password # SMTP password (empty string is fine if not using email)
      remoteRef:
        key: netbox/email
        property: password
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-superuser-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-superuser-secret
    creationPolicy: Owner
  data:
    - secretKey: username # → env SUPERUSER_NAME
      remoteRef:
        key: netbox/superuser
        property: username
    - secretKey: email # → env SUPERUSER_EMAIL
      remoteRef:
        key: netbox/superuser
        property: email
    - secretKey: password # → /run/secrets/superuser_password
      remoteRef:
        key: netbox/superuser
        property: password
    - secretKey: api_token # → /run/secrets/superuser_api_token
      remoteRef:
        key: netbox/superuser
        property: api_token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-postgresql-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-postgresql-secret
    creationPolicy: Owner
  data:
    - secretKey: password # → /run/secrets/netbox (db_password)
      remoteRef:
        key: netbox/postgresql
        property: password
    - secretKey: postgres-password # → postgresql superuser (Bitnami sub-chart)
      remoteRef:
        key: netbox/postgresql
        property: postgresPassword
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: netbox-redis-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: netbox-redis-secret
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: netbox/redis
        property: password
