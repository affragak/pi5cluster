# apps/base/netbox/values.yaml
# Chart: netbox v8.0.23 from https://charts.netbox.oss.netboxlabs.com/
# Secrets injected via ExternalSecret (see externalsecret.yaml)

# ---------------------------------------------------------------------------
# Superuser — password comes from the Secret below
# ---------------------------------------------------------------------------
superuser:
  name: admin
  email: admin@uclab.dev
  existingSecret: netbox-superuser-secret
  existingSecretPasswordKey: superuserPassword
  existingSecretApiTokenKey: superuserApiToken

# ---------------------------------------------------------------------------
# Django secret key — read from Secret
# ---------------------------------------------------------------------------
existingSecret: netbox-secret
secretKey: secretKey

# ---------------------------------------------------------------------------
# NetBox config
# ---------------------------------------------------------------------------
allowedHosts:
  - "netbox.local"
  - "netbox"

timeZone: Europe/Berlin
dateFormat: "N j, Y"
shortDateFormat: "Y-m-d"

loginRequired: false

# ---------------------------------------------------------------------------
# Persistence — disabled (local-path is RWO; re-enable with Longhorn/NFS)
# ---------------------------------------------------------------------------
persistence:
  enabled: false

# ---------------------------------------------------------------------------
# PostgreSQL (bundled Bitnami sub-chart)
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  auth:
    username: netbox
    database: netbox
    existingSecret: netbox-postgresql-secret
    secretKeys:
      adminPasswordKey: postgresPassword
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

# ---------------------------------------------------------------------------
# Redis (bundled Bitnami sub-chart)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  auth:
    existingSecret: netbox-redis-secret
    existingSecretPasswordKey: redisPassword
  master:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ---------------------------------------------------------------------------
# Resources (sized for Pi5)
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

worker:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

housekeeping:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

replicaCount: 1
