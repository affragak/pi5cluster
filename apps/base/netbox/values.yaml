# Chart: netbox-8.0.23 (NetBox v4.5.5)
# Secret key names are chart defaults — do not override existingSecretXxxKey fields

superuser:
  existingSecret: netbox-superuser-secret
  # chart reads: username, email, email_password, api_token from this secret

existingSecret: netbox-secret
existingSecretKey: secret_key

allowedHosts:
  - "netbox.local"
  - "netbox"
  - "localhost"
  - "*"

timeZone: Europe/Berlin
loginRequired: false
defaultLanguage: en-us

persistence:
  enabled: false

postgresql:
  enabled: true
  auth:
    username: netbox
    database: netbox
    existingSecret: netbox-postgresql-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  enabled: true
  auth:
    existingSecret: netbox-redis-secret
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

worker:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

housekeeping:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

replicaCount: 1
