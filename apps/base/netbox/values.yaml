# Chart: netbox-8.0.23  (NetBox v4.5.5)

superuser:
  name: "" # read from secret
  email: "" # read from secret
  existingSecret: netbox-superuser-secret
  existingSecretUsernameKey: username
  existingSecretEmailKey: email
  existingSecretPasswordKey: password
  existingSecretApiTokenKey: api_token

# Django secret key
existingSecret: netbox-secret
existingSecretKey: secret_key

allowedHosts:
  - "netbox.local"
  - "netbox"

timeZone: Europe/Berlin
loginRequired: false

persistence:
  enabled: false # local-path is RWO only; re-enable with Longhorn

postgresql:
  enabled: true
  auth:
    username: netbox
    database: netbox
    existingSecret: netbox-postgresql-secret
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

redis:
  enabled: true
  auth:
    existingSecret: netbox-redis-secret
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      enabled: true
      storageClass: "local-path"
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

worker:
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

housekeeping:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

replicaCount: 1
