apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: paperless-container-env
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-backend-global
    kind: ClusterSecretStore
  target:
    name: paperless-env-container-db
    creationPolicy: Owner
  data:
    - secretKey: PAPERLESS_DBUSER
      remoteRef:
        key: paperless-env-container-db
        property: username
    - secretKey: PAPERLESS_DBPASS
      remoteRef:
        key: paperless-env-container-db
        property: password
