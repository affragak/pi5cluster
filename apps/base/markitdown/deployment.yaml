apiVersion: apps/v1
kind: Deployment
metadata:
  name: markitdown-svc
  namespace: markitdown
  labels:
    app.kubernetes.io/name: markitdown-svc
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: markitdown-svc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: markitdown-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
        - name: markitdown-svc
          image: forgejo.uclab.dev/affragak/markitdown:d9b2701
          imagePullPolicy: Always
          ports:
            - containerPort: 8088

          env:
            - name: STORAGE_ROOT
              value: /data

          volumeMounts:
            - name: data
              mountPath: /data

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 15
            periodSeconds: 20

          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: markitdown-data
