apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami-proxy
  namespace: umami
spec:
  hostnames:
    - uclab.dev
  parentRefs:
    - name: umami # same gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /stats/script.js
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /script.js
      backendRefs:
        - name: umami-server
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /stats/api/send
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /api/send
      backendRefs:
        - name: umami-server
          port: 3000
