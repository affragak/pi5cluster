apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami
  namespace: umami
spec:
  hostnames:
    - umami.uclab.dev # Specify a valid domain to reach your application
  parentRefs:
    - name: umami
  rules:
    - backendRefs:
        - name: umami-server # Specify the service of the application
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /
status:
  parents: []
