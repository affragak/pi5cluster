apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: awx
  namespace: awx
spec:
  hostnames:
    - awx.uclab.dev # Specify a valid domain to reach your application
  parentRefs:
    - name: awx
  rules:
    - backendRefs:
        - name: awx-service # Specify the service of the application
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: /
status:
  parents: []
