apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forgejo
resources:
  - ../../base/forgejo/
  - gateway.yaml
  - httproute.yaml
  - certificate.yaml

patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: forgejo-config
        namespace: forgejo
      data:
        FORGEJO__server__DOMAIN: forgejo.uclab8.net
        FORGEJO__server__ROOT_URL: https://forgejo.uclab8.net/
        FORGEJO__server__SSH_DOMAIN: git.uclab8.net
    target:
      kind: ConfigMap
      name: forgejo-config
