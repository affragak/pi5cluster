apiVersion: policy.sigstore.dev/v1beta1
kind: ClusterImagePolicy
metadata:
  name: uclab-image-policy
spec:
  match:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: uclab
    # - group: apps
    #   version: v1
    #   resource: deployments
    #   selector:
    #     matchLabels:
    #       app: uclab
    # - group: apps
    #   version: v1
    #   resource: replicasets
    #   selector:
    #     matchLabels:
    #       app: uclab
    # - group: ""
    #   version: v1
    #   resource: pods
    #   selector:
    #     matchLabels:
    #       app: uclab
  images:
    - glob: "forgejo.uclab.dev/affragak/uclab**"
  authorities:
    - name: uclab
      key:
        secretRef:
          name: cosign-pub-key
          namespace: cosign-system
